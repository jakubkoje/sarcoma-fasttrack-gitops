apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - pvc.yaml

configMapGenerator:
  - name: mongodb-connection
    options:
      disableNameSuffixHash: true
    literals:
      - host=mongodb
      - port=27017

labels:
  - pairs:
      app.kubernetes.io/name: mongodb
      app.kubernetes.io/component: database
