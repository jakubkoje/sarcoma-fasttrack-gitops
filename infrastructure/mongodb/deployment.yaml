apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      pod: mongodb
  template:
    metadata:
      labels:
        pod: mongodb
    spec:
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: mongo-pvc
      containers:
        - name: mongodb
          image: mongo:7
          imagePullPolicy: Always
          ports:
            - name: mongodb
              containerPort: 27017
          volumeMounts:
            - name: db-data
              mountPath: /data/db
          resources:
            requests:
              memory: "128Mi"
              cpu: "0.01"
            limits:
              memory: "512Mi"
              cpu: "0.2"
